<!DOCTYPE html>

<html class="dark" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JAS Driver App - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&amp;family=Inter:wght@400;500&amp;family=Tajawal:wght@400;700&amp;family=IBM+Plex+Arabic:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-bright": "#383845",
                    "inverse-on-surface": "#302f3b",
                    "on-error": "#690005",
                    "on-tertiary-container": "#f09661",
                    "secondary-fixed-dim": "#cfbef6",
                    "on-primary": "#3b0092",
                    "surface-tint": "#d0bcff",
                    "on-tertiary": "#532200",
                    "on-surface-variant": "#cbc3d5",
                    "on-background": "#e3e0f1",
                    "background": "#12121d",
                    "on-secondary": "#352856",
                    "on-primary-fixed-variant": "#5228aa",
                    "outline": "#948e9e",
                    "on-secondary-container": "#c0b0e7",
                    "inverse-surface": "#e3e0f1",
                    "on-secondary-fixed": "#201340",
                    "on-surface": "#e3e0f1",
                    "surface-container-low": "#1b1a26",
                    "surface-container-highest": "#343440",
                    "outline-variant": "#494453",
                    "inverse-primary": "#6a45c3",
                    "error": "#ffb4ab",
                    "surface-container-high": "#292935",
                    "primary-fixed-dim": "#d0bcff",
                    "surface-container-lowest": "#0d0d18",
                    "primary": "#d0bcff",
                    "error-container": "#93000a",
                    "surface-dim": "#12121d",
                    "primary-container": "#4b1fa3",
                    "secondary-container": "#4f4171",
                    "on-tertiary-fixed-variant": "#743405",
                    "on-error-container": "#ffdad6",
                    "primary-fixed": "#e9ddff",
                    "on-primary-fixed": "#22005c",
                    "on-primary-container": "#b79cff",
                    "tertiary-fixed-dim": "#ffb68e",
                    "secondary-fixed": "#e9ddff",
                    "secondary": "#cfbef6",
                    "tertiary": "#ffb68e",
                    "surface": "#12121d",
                    "tertiary-fixed": "#ffdbc9",
                    "on-tertiary-fixed": "#331200",
                    "on-secondary-fixed-variant": "#4c3f6e",
                    "tertiary-container": "#6c2e00",
                    "surface-variant": "#343440",
                    "surface-container": "#1f1e2a"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"],
                    "tajawal": ["Tajawal", "sans-serif"]
            }
          },
        }
      }
    </script>
<style>
        body {
            background-color: #0A0C14;
            color: #e3e0f1;
            font-family: 'Inter', 'Tajawal', sans-serif;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .swoosh-gradient {
            background: radial-gradient(circle at 70% 30%, rgba(75, 31, 163, 0.4) 0%, transparent 60%);
        }
        .accent-green {
            color: #22C55E;
        }
        .bg-accent-green {
            background-color: #22C55E;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col">
<!-- Top Area (40% height) -->
<header class="h-[353px] w-full relative flex flex-col items-center justify-center overflow-hidden">
<!-- Purple geometric swoosh decorative element -->
<div class="absolute inset-0 swoosh-gradient pointer-events-none opacity-60"></div>
<div class="absolute -top-20 -right-20 w-80 h-80 bg-primary-container/20 rounded-full blur-[100px]"></div>
<!-- Logo & Branding Cluster -->
<div class="relative z-10 flex flex-col items-center space-y-4">
<div class="w-[140px] h-[60px] flex items-center justify-center">
<!-- Placeholder for JAS Logo -->
<div class="text-4xl font-extrabold tracking-tighter text-white font-headline">
                    JAS<span class="accent-green">.</span>
</div>
</div>
<div class="text-center space-y-1">
<h1 class="text-[22px] font-bold text-white font-headline">JAS Driver App</h1>
<h2 class="text-[18px] font-bold accent-green font-tajawal">تطبيق سائق جاس</h2>
<p class="text-[13px] text-on-surface-variant/60 font-label">Driver Portal / بوابة السائق</p>
</div>
</div>
</header>
<!-- Login Form Area -->
<main class="flex-grow px-8 pb-12">
<form class="space-y-6 max-w-md mx-auto">
<!-- Mobile Number Field -->
<div class="space-y-2">
<label class="flex justify-between text-sm font-medium text-on-surface-variant font-tajawal">
<span>Mobile Number</span>
<span>رقم الجوال</span>
</label>
<div class="relative group">
<input class="w-full h-[52px] bg-surface-container-highest/30 border-none rounded-xl px-4 text-white placeholder-white/20 focus:ring-2 focus:ring-primary/50 transition-all text-left dir-ltr" inputmode="numeric" pattern="[0-9]*" placeholder="05XXXXXXXX" type="tel"/>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-on-surface-variant/40">
<span class="material-symbols-outlined text-[20px]">phone_iphone</span>
</div>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="flex justify-between text-sm font-medium text-on-surface-variant font-tajawal">
<span>Password</span>
<span>كلمة المرور</span>
</label>
<div class="relative group">
<input class="w-full h-[52px] bg-surface-container-highest/30 border-none rounded-xl px-4 text-white placeholder-white/20 focus:ring-2 focus:ring-primary/50 transition-all text-left dir-ltr" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-on-surface-variant/60 hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="text-sm text-on-surface-variant/70 hover:text-white font-tajawal transition-colors" href="#">
                    نسيت كلمة المرور؟ / Forgot password?
                </a>
</div>
<!-- Login Button -->
<button class="w-full h-[52px] bg-accent-green hover:bg-opacity-90 text-white font-tajawal font-bold text-[15px] rounded-xl shadow-lg shadow-green-900/20 active:scale-[0.98] transition-all flex items-center justify-center" type="submit">
                تسجيل الدخول / Login
            </button>
<!-- Divider -->
<div class="relative py-4">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div>
<div class="relative flex justify-center text-xs font-medium bg-[#0A0C14] px-4 text-on-surface-variant/40 uppercase tracking-widest font-tajawal">
                    أو / or
                </div>
</div>
<!-- Absher Button -->
<button class="w-full h-[52px] border border-white/10 hover:bg-white/5 text-white font-tajawal font-bold text-[15px] rounded-xl flex items-center justify-center gap-3 transition-all" type="button">
<div class="w-6 h-6 bg-white/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-sm">verified_user</span>
</div>
<span>التسجيل عبر أبشر / Register via Absher</span>
</button>
</form>
</main>
<!-- Bottom Language Toggle -->
<footer class="pb-10 flex flex-col items-center">
<div class="flex bg-surface-container-low/50 p-1 rounded-full border border-white/5">
<button class="px-6 py-2 rounded-full text-xs font-bold font-tajawal bg-accent-green text-white shadow-sm">
                العربية
            </button>
<button class="px-6 py-2 rounded-full text-xs font-bold font-label text-on-surface-variant/50 hover:text-white transition-colors">
                English
            </button>
</div>
<!-- Decoration element -->
<div class="mt-8 w-1/3 h-1 bg-white/5 rounded-full"></div>
</footer>
<!-- Suppressed Nav Shells as per Focused Transactional Rule -->
</body></html>
